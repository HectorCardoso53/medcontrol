<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - MedControl</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="login-wrapper">

        <div class="login-card">

            <div class="login-header">

                <img src="/img/prefeitura.png" style="height:100px;margin-bottom:10px">
                <h1>MedControl</h1>
                <p>Sistema de Controle de Medicamentos</p>
            </div>

            <form id="formLogin" class="login-form">

                <div class="mb-3">
                    <label class="form-label">Email</label>

                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>

                        <input type="email" id="email" class="form-control" placeholder="Digite seu email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Senha</label>

                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>

                        <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-login w-100">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Entrar no sistema
                </button>

            </form>

            <!-- Barra de progresso -->
            <div id="loginProgress" class="progress mt-3" style="height:6px; display:none;">
                <div id="loginBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%">
                </div>
            </div>

            <!-- Rodapé institucional -->
            <div class="login-orgao">
                <p class="login-dev">Desenvolvido por SEMEG</p>
                <p class="login-dev">Secretaria de Eficiência Governamental</p>
            </div>

        </div>

    </div>

    <script type="module" src="login.js"></script>

</body>

</html>
